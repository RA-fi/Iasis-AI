version: '3.8'

services:
  fastapi_server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./models:/app/models
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: You will need to exec into the ollama container and run `ollama pull llama3` or `qwen2.5`
    # e.g., docker exec -it iasis-ollama-1 ollama pull llama3

volumes:
  ollama_data:
