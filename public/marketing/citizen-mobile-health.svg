<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <rect width="800" height="600" fill="#f0faf4"/>

  <!-- Background subtle grid -->
  <line x1="0" y1="150" x2="800" y2="150" stroke="#d1f0de" stroke-width="1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#d1f0de" stroke-width="1"/>
  <line x1="0" y1="450" x2="800" y2="450" stroke="#d1f0de" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="600" stroke="#d1f0de" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#d1f0de" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="#d1f0de" stroke-width="1"/>

  <!-- Decorative blobs -->
  <circle cx="120" cy="100" r="180" fill="#dcfce7" opacity="0.5"/>
  <circle cx="680" cy="500" r="200" fill="#bbf7d0" opacity="0.4"/>
  <circle cx="700" cy="80" r="120" fill="#a7f3d0" opacity="0.3"/>

  <!-- Phone frame -->
  <rect x="290" y="80" width="220" height="440" rx="28" fill="#1a2e22"/>
  <rect x="298" y="88" width="204" height="424" rx="22" fill="#0f1a13"/>
  <!-- Screen -->
  <rect x="302" y="100" width="196" height="400" rx="16" fill="#111f16"/>
  <!-- Notch -->
  <rect x="355" y="88" width="90" height="16" rx="8" fill="#1a2e22"/>

  <!-- App screen content -->
  <rect x="302" y="100" width="196" height="400" rx="16" fill="#f8fffe"/>

  <!-- Top bar on phone -->
  <rect x="302" y="100" width="196" height="44" rx="0" fill="#16a34a"/>
  <rect x="302" y="100" width="196" height="44" rx="16" fill="#16a34a"/>
  <rect x="302" y="122" width="196" height="22" fill="#16a34a"/>
  <text x="338" y="128" font-family="sans-serif" font-size="11" font-weight="600" fill="white">Iasis AI</text>
  <!-- Status icons on phone top bar -->
  <circle cx="474" cy="122" r="4" fill="white" opacity="0.7"/>
  <circle cx="484" cy="122" r="4" fill="white" opacity="0.7"/>

  <!-- Greeting card -->
  <rect x="314" y="152" width="172" height="52" rx="10" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="324" y="172" font-family="sans-serif" font-size="9" fill="#16a34a" font-weight="600">Good morning, Amina</text>
  <text x="324" y="188" font-family="sans-serif" font-size="8" fill="#6b7280">How are you feeling today?</text>
  <circle cx="468" cy="175" r="12" fill="#dcfce7"/>
  <text x="462" y="180" font-family="sans-serif" font-size="12">😊</text>

  <!-- Triage button -->
  <rect x="314" y="214" width="172" height="40" rx="10" fill="#16a34a"/>
  <text x="358" y="239" font-family="sans-serif" font-size="10" font-weight="600" fill="white">AI Triage</text>
  <text x="327" y="239" font-family="sans-serif" font-size="13" fill="white">🩺</text>

  <!-- Two small cards row -->
  <rect x="314" y="264" width="80" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="322" y="285" font-family="sans-serif" font-size="16">💊</text>
  <text x="322" y="300" font-family="sans-serif" font-size="8" font-weight="600" fill="#374151">Reminders</text>
  <text x="322" y="313" font-family="sans-serif" font-size="7" fill="#9ca3af">3 today</text>

  <rect x="406" y="264" width="80" height="60" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="414" y="285" font-family="sans-serif" font-size="16">📋</text>
  <text x="414" y="300" font-family="sans-serif" font-size="8" font-weight="600" fill="#374151">Records</text>
  <text x="414" y="313" font-family="sans-serif" font-size="7" fill="#9ca3af">Up to date</text>

  <!-- Recent activity -->
  <text x="320" y="344" font-family="sans-serif" font-size="8" font-weight="600" fill="#6b7280" letter-spacing="0.5">RECENT</text>
  <rect x="314" y="352" width="172" height="32" rx="7" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="328" cy="368" r="8" fill="#dcfce7"/>
  <text x="323" y="372" font-family="sans-serif" font-size="9">🔬</text>
  <text x="342" y="364" font-family="sans-serif" font-size="8" font-weight="500" fill="#374151">Lab Report — CBC</text>
  <text x="342" y="376" font-family="sans-serif" font-size="7" fill="#9ca3af">2 days ago · Normal</text>

  <rect x="314" y="390" width="172" height="32" rx="7" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <circle cx="328" cy="406" r="8" fill="#fef9c3"/>
  <text x="323" y="410" font-family="sans-serif" font-size="9">📅</text>
  <text x="342" y="402" font-family="sans-serif" font-size="8" font-weight="500" fill="#374151">Dr. Rahman — Tuesday</text>
  <text x="342" y="414" font-family="sans-serif" font-size="7" fill="#9ca3af">10:00 AM · Confirmed</text>

  <!-- Bottom nav bar on phone -->
  <rect x="302" y="460" width="196" height="40" rx="0" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0"/>
  <rect x="302" y="460" width="196" height="40" rx="0" fill="#f9fafb"/>
  <line x1="302" y1="460" x2="498" y2="460" stroke="#e5e7eb" stroke-width="1"/>
  <text x="320" y="484" font-family="sans-serif" font-size="16">🏠</text>
  <text x="360" y="484" font-family="sans-serif" font-size="16">🩺</text>
  <text x="400" y="484" font-family="sans-serif" font-size="16">💬</text>
  <text x="440" y="484" font-family="sans-serif" font-size="16">👤</text>

  <!-- Floating card top-left: health score -->
  <rect x="50" y="160" width="190" height="90" rx="14" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#00000018"/>
    </filter>
  </defs>
  <circle cx="78" cy="197" r="18" fill="#dcfce7"/>
  <text x="68" y="203" font-family="sans-serif" font-size="18">❤️</text>
  <text x="102" y="192" font-family="sans-serif" font-size="11" font-weight="700" fill="#111827">Health Score</text>
  <text x="102" y="208" font-family="sans-serif" font-size="22" font-weight="800" fill="#16a34a">87</text>
  <text x="130" y="208" font-family="sans-serif" font-size="9" fill="#9ca3af">/ 100</text>
  <text x="102" y="222" font-family="sans-serif" font-size="8" fill="#6b7280">Good — keep it up!</text>

  <!-- Floating card bottom-right: family -->
  <rect x="560" y="340" width="190" height="110" rx="14" fill="white" stroke="#e5e7eb" stroke-width="1" filter="url(#shadow)"/>
  <text x="578" y="366" font-family="sans-serif" font-size="10" font-weight="700" fill="#111827">Family Profiles</text>
  <!-- Avatar circles -->
  <circle cx="586" cy="395" r="18" fill="#bfdbfe"/>
  <text x="577" y="400" font-family="sans-serif" font-size="15">👩</text>
  <circle cx="618" cy="395" r="18" fill="#fde68a"/>
  <text x="609" y="400" font-family="sans-serif" font-size="15">👴</text>
  <circle cx="650" cy="395" r="18" fill="#bbf7d0"/>
  <text x="641" y="400" font-family="sans-serif" font-size="15">👦</text>
  <circle cx="682" cy="395" r="18" fill="#fecaca"/>
  <text x="673" y="400" font-family="sans-serif" font-size="15">👧</text>
  <text x="578" y="435" font-family="sans-serif" font-size="8" fill="#6b7280">4 members · All records linked</text>

  <!-- Decorative dots -->
  <circle cx="100" cy="450" r="6" fill="#86efac"/>
  <circle cx="120" cy="470" r="4" fill="#4ade80"/>
  <circle cx="140" cy="445" r="5" fill="#bbf7d0"/>
  <circle cx="680" cy="160" r="7" fill="#6ee7b7"/>
  <circle cx="700" cy="180" r="4" fill="#34d399"/>
  <circle cx="660" cy="170" r="5" fill="#a7f3d0"/>
</svg>
